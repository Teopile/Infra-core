version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current as new releases ship.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Surface npm dependency and security updates (Next.js, etc.).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
